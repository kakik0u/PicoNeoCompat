name: build

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Build and smoke test
        shell: powershell
        run: .\scripts\build.ps1
      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: nvEncCompat64
          path: build/nvEncCompat64.dll

